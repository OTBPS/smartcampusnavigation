<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2.4; }
      .frontend { fill: #eaf3ff; stroke: #2563eb; }
      .backend { fill: #eafaf2; stroke: #15935f; }
      .data { fill: #f3ecff; stroke: #7c3fc4; }
      .external { fill: #fff3e3; stroke: #e17b24; }
      .text { font-family: "Times New Roman", Arial, sans-serif; fill: #111827; }
      .title { font-size: 34px; font-weight: 700; }
      .item { font-size: 25px; }
      .layer { font-size: 30px; font-weight: 700; }
      .arrow { stroke: #475569; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" width="1400" height="900" />
  <text class="text title" x="700" y="70" text-anchor="middle">System Technology Stack</text>

  <rect class="box frontend" x="160" y="120" width="1080" height="135" rx="18" />
  <text class="text layer" x="700" y="165" text-anchor="middle">Frontend Layer</text>
  <text class="text item" x="700" y="210" text-anchor="middle">Thymeleaf    HTML    CSS    Native JavaScript</text>

  <path class="arrow" d="M 700 265 L 700 315" />

  <rect class="box backend" x="160" y="330" width="1080" height="150" rx="18" />
  <text class="text layer" x="700" y="375" text-anchor="middle">Backend Layer</text>
  <text class="text item" x="700" y="420" text-anchor="middle">Spring Boot    Spring MVC    Validation</text>
  <text class="text item" x="700" y="455" text-anchor="middle">Unified Response    Exception Handling</text>

  <path class="arrow" d="M 530 490 L 530 540" />
  <path class="arrow" d="M 870 490 L 870 540" />

  <rect class="box data" x="160" y="555" width="470" height="150" rx="18" />
  <text class="text layer" x="395" y="605" text-anchor="middle">Data Layer</text>
  <text class="text item" x="395" y="655" text-anchor="middle">MyBatis    MySQL</text>

  <rect class="box external" x="770" y="555" width="470" height="150" rx="18" />
  <text class="text layer" x="1005" y="605" text-anchor="middle">External Service Layer</text>
  <text class="text item" x="1005" y="655" text-anchor="middle">AMap    QWeather API</text>
  <text class="text item" x="1005" y="690" text-anchor="middle">DeepSeek Backend Proxy</text>

  <path class="arrow" d="M 630 630 L 770 630" />
</svg>
