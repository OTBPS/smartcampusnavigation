<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <style>
      .bg{fill:#fff}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2.2}
      .blue{fill:#eaf3ff;stroke:#2563eb}
      .green{fill:#eafaf2;stroke:#15935f}
      .orange{fill:#fff3e3;stroke:#e17b24}
      .purple{fill:#f3ecff;stroke:#7c3fc4}
      .red{fill:#fff1f2;stroke:#e11d48}
      .line{stroke:#475569;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .plain-line{stroke:#475569;stroke-width:2.6;fill:none}
      .text{font-family:"Times New Roman",Arial,sans-serif;fill:#111827}
      .title{font-size:30px;font-weight:700}
      .label{font-size:23px}
      .small{font-size:19px}
      .tiny{font-size:17px}
      .bold{font-weight:700}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1500" height="900"/>
  
<rect class="box blue" x="580" y="70" width="340" height="75" rx="16"/>
<text class="text label bold" x="750" y="115.5" text-anchor="middle">Enter Keyword</text>

<path class="line" d="M750 145 L750 205"/>
<rect class="box green" x="560" y="215" width="380" height="75" rx="16"/>
<text class="text label bold" x="750" y="260.5" text-anchor="middle">Send POI Request</text>

<path class="line" d="M750 290 L750 350"/>
<rect class="box purple" x="545" y="360" width="410" height="75" rx="16"/>
<text class="text label bold" x="750" y="405.5" text-anchor="middle">Query poi Table</text>

<path class="line" d="M750 435 L750 495"/>
<rect class="box green" x="545" y="505" width="410" height="75" rx="16"/>
<text class="text label bold" x="750" y="550.5" text-anchor="middle">Return POI List</text>

<path class="line" d="M750 580 L750 640"/>
<rect class="box blue" x="180" y="650" width="390" height="80" rx="16"/>
<text class="text label bold" x="375" y="698" text-anchor="middle">Render Result List</text>

<rect class="box blue" x="930" y="650" width="390" height="80" rx="16"/>
<text class="text label bold" x="1125" y="698" text-anchor="middle">Display Map Markers</text>

<path class="line" d="M750 640 L375 640 L375 650"/>
<path class="line" d="M750 640 L1125 640 L1125 650"/>
<rect class="box orange" x="555" y="775" width="390" height="75" rx="16"/>
<text class="text label bold" x="750" y="820.5" text-anchor="middle">Show No-Result Prompt</text>

<path class="line" d="M750 580 L750 775"/>

</svg>