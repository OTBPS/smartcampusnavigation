<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <style>
      .bg{fill:#fff}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2.2}
      .blue{fill:#eaf3ff;stroke:#2563eb}
      .green{fill:#eafaf2;stroke:#15935f}
      .orange{fill:#fff3e3;stroke:#e17b24}
      .purple{fill:#f3ecff;stroke:#7c3fc4}
      .red{fill:#fff1f2;stroke:#e11d48}
      .line{stroke:#475569;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .plain-line{stroke:#475569;stroke-width:2.6;fill:none}
      .text{font-family:"Times New Roman",Arial,sans-serif;fill:#111827}
      .title{font-size:30px;font-weight:700}
      .label{font-size:23px}
      .small{font-size:19px}
      .tiny{font-size:17px}
      .bold{font-weight:700}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1500" height="900"/>
  
<rect class="box blue" x="120" y="90" width="1260" height="105" rx="16"/>
<text class="text label bold" x="750" y="134.5" text-anchor="middle">Presentation Layer</text>
<text class="text small" x="750" y="170.5" text-anchor="middle">Thymeleaf / HTML / CSS / Native JavaScript</text>
<path class="line" d="M750 205 L750 265"/>
<rect class="box green" x="120" y="280" width="1260" height="105" rx="16"/>
<text class="text label bold" x="750" y="324.5" text-anchor="middle">Controller Layer</text>
<text class="text small" x="750" y="360.5" text-anchor="middle">Spring MVC Controllers / Unified API Response</text>
<path class="line" d="M750 395 L750 455"/>
<rect class="box green" x="120" y="470" width="1260" height="105" rx="16"/>
<text class="text label bold" x="750" y="514.5" text-anchor="middle">Service Layer</text>
<text class="text small" x="750" y="550.5" text-anchor="middle">POI / Route / Weather / Suggestion / Saved Places / Route History / Intelligent Assistant</text>
<path class="line" d="M520 585 L520 650"/>
<path class="line" d="M980 585 L980 650"/>
<rect class="box purple" x="120" y="665" width="620" height="115" rx="16"/>
<text class="text label bold" x="430" y="714.5" text-anchor="middle">Persistence Layer</text>
<text class="text small" x="430" y="750.5" text-anchor="middle">MyBatis Mapper / MySQL</text>
<rect class="box orange" x="820" y="665" width="560" height="115" rx="16"/>
<text class="text label bold" x="1100" y="714.5" text-anchor="middle">Third-Party Services</text>
<text class="text small" x="1100" y="750.5" text-anchor="middle">AMap / QWeather API / DeepSeek Proxy</text>
<path class="line" d="M740 722 L820 722"/>

</svg>