<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <style>
      .bg{fill:#fff}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2.2}
      .blue{fill:#eaf3ff;stroke:#2563eb}
      .green{fill:#eafaf2;stroke:#15935f}
      .orange{fill:#fff3e3;stroke:#e17b24}
      .purple{fill:#f3ecff;stroke:#7c3fc4}
      .red{fill:#fff1f2;stroke:#e11d48}
      .line{stroke:#475569;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .plain-line{stroke:#475569;stroke-width:2.6;fill:none}
      .text{font-family:"Times New Roman",Arial,sans-serif;fill:#111827}
      .title{font-size:30px;font-weight:700}
      .label{font-size:23px}
      .small{font-size:19px}
      .tiny{font-size:17px}
      .bold{font-weight:700}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1500" height="900"/>
  
<rect class="box green" x="500" y="70" width="500" height="85" rx="16"/>
<text class="text label bold" x="750" y="120.5" text-anchor="middle">Campus Intelligent Navigation System</text>

<path class="line" d="M750 155 L750 220"/>
<path class="plain-line" d="M250 220 L1250 220"/>
<path class="line" d="M250 220 L250 280"/>
<path class="line" d="M450 220 L450 280"/>
<path class="line" d="M650 220 L650 280"/>
<path class="line" d="M850 220 L850 280"/>
<path class="line" d="M1050 220 L1050 280"/>
<path class="line" d="M1250 220 L1250 280"/>
<rect class="box blue" x="105" y="280" width="290" height="90" rx="16"/>
<text class="text label bold" x="250" y="317" text-anchor="middle">POI Retrieval</text>
<text class="text small" x="250" y="353" text-anchor="middle">Search / Details</text>
<rect class="box green" x="305" y="430" width="290" height="90" rx="16"/>
<text class="text label bold" x="450" y="467" text-anchor="middle">Route Planning</text>
<text class="text small" x="450" y="503" text-anchor="middle">Walking / Cycling</text>
<rect class="box orange" x="505" y="280" width="290" height="90" rx="16"/>
<text class="text label bold" x="650" y="317" text-anchor="middle">Weather &amp; Suggestion</text>
<text class="text small" x="650" y="353" text-anchor="middle">Weather / Travel Prompt</text>
<rect class="box purple" x="705" y="430" width="290" height="90" rx="16"/>
<text class="text label bold" x="850" y="467" text-anchor="middle">Saved Places</text>
<text class="text small" x="850" y="503" text-anchor="middle">Add / Rename / Delete</text>
<rect class="box purple" x="905" y="280" width="290" height="90" rx="16"/>
<text class="text label bold" x="1050" y="317" text-anchor="middle">Route History</text>
<text class="text small" x="1050" y="353" text-anchor="middle">Store / Reuse / Delete</text>
<rect class="box orange" x="1105" y="430" width="290" height="90" rx="16"/>
<text class="text label bold" x="1250" y="467" text-anchor="middle">Intelligent Assistant</text>
<text class="text small" x="1250" y="503" text-anchor="middle">Context / Answer</text>

</svg>